name: Refresh projections

on:
  schedule:
    - cron: "0 12 * * *"   # ~8am ET: fresh odds/probables before day games (GitHub cron is always UTC)
    - cron: "0 21 * * *"   # ~5pm ET: refresh before the evening slate
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # notebooks_out/ (fitted model parameters) is gitignored -- a fresh
      # checkout has none of it, so every backtest that writes there has to
      # run before anything that reads its output. Skipping this caused
      # every scheduled run to fail at "Generate current-week projections"
      # (FileNotFoundError on nfl_win_prob_backtest.json) until this fix.
      - name: Pull latest NFL data
        run: python pipeline/nfl/pull_data.py

      - name: Fit/backtest NFL win-probability model
        run: python pipeline/nfl/backtest_win_prob.py

      - name: Generate current-week NFL projections
        run: python pipeline/nfl/generate_current_week.py

      # NOTE: these two MLB pulls currently re-pull the FULL 2024-present
      # history every run (team schedules via 30x Baseball-Reference scrapes,
      # plus month-by-month Statcast). That's a real inefficiency -- it only
      # needs to grow by one day's worth of games -- but the daily runtime
      # cost is acceptable for now (public repos get unlimited Actions
      # minutes) and correctness matters more than efficiency here. Worth
      # revisiting: switch to incremental pulls that only fetch new games
      # since the last run.
      - name: Pull latest MLB team schedule/results
        run: python pipeline/mlb/pull_team_games.py

      - name: Pull latest MLB Statcast game logs
        run: python pipeline/mlb/pull_statcast_gamelogs.py

      - name: Fit/backtest MLB win-probability model
        run: python pipeline/mlb/backtest_win_prob.py

      - name: Fit/backtest MLB starting-pitcher + bullpen blend
        run: python pipeline/mlb/backtest_pitcher_model.py

      - name: Generate current-slate MLB projections
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python pipeline/mlb/generate_daily_slate.py

      - name: Build static site
        run: python pipeline/nfl/build_static_site.py

      - name: Commit and push updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --quiet --cached || git commit -m "Auto-refresh NFL + MLB projections"
          git push
