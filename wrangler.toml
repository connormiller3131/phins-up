# Deploys docs/ as a Cloudflare Worker with static assets (Cloudflare's
# current recommended way to serve a static site -- classic "Pages
# Projects" is being superseded by this).
#
# site-worker.js is the entry point (not a pure asset-only worker) so it can
# force a no-cache header on every response -- the docs/_headers convention
# is NOT honored by this platform (confirmed against a real stale response),
# so this is the reliable way to control caching for a site that regenerates
# twice daily.
#
# Deploy: npx wrangler deploy (from the repo root)
name = "phinsup"
main = "site-worker.js"
compatibility_date = "2024-01-01"

# phinsup.net was bought directly through Cloudflare (already on Cloudflare's
# own nameservers), so this attaches it as a custom domain automatically on
# every deploy -- no manual dashboard step or external DNS change needed.
# MUST be a top-level key, not nested under [assets] -- a real deploy warned
# "Unexpected fields found in assets field: routes" when this was placed
# after the [assets] section below, meaning TOML silently scoped it into
# that table instead of applying it as a real route. Likely explains why the
# custom domain kept serving stale content no matter what: its binding
# probably wasn't being correctly re-applied on later deploys at all.
routes = [
  { pattern = "phinsup.net", custom_domain = true },
  { pattern = "www.phinsup.net", custom_domain = true },
]

[assets]
directory = "./docs"
binding = "ASSETS"
# By default Cloudflare serves a matching static asset directly and never
# invokes the attached Worker script at all -- confirmed this the hard way:
# site-worker.js's Cache-Control override wasn't showing up on ANY request,
# even a fresh workers.dev one with otherwise-correct (non-stale) content.
# This forces every request through the script first so it can actually
# rewrite the response header.
run_worker_first = true
