# Deploys docs/ as a Cloudflare Worker with static assets (Cloudflare's
# current recommended way to serve a static site -- classic "Pages
# Projects" is being superseded by this).
#
# site-worker.js is the entry point (not a pure asset-only worker) so it can
# force a no-cache header on every response -- the docs/_headers convention
# is NOT honored by this platform (confirmed against a real stale response),
# so this is the reliable way to control caching for a site that regenerates
# twice daily.
#
# Deploy: npx wrangler deploy (from the repo root)
name = "phinsup"
main = "site-worker.js"
compatibility_date = "2024-01-01"

[assets]
directory = "./docs"
binding = "ASSETS"

# phinsup.net was bought directly through Cloudflare (already on Cloudflare's
# own nameservers), so this attaches it as a custom domain automatically on
# every deploy -- no manual dashboard step or external DNS change needed.
routes = [
  { pattern = "phinsup.net", custom_domain = true },
  { pattern = "www.phinsup.net", custom_domain = true },
]
