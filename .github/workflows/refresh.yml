name: Refresh projections

on:
  schedule:
    - cron: "0 6 * * *"    # 2am ET (EDT, UTC-4) -- GitHub cron is fixed UTC, so this reads as 1am once EST (winter, UTC-5) kicks in
    - cron: "0 15 * * *"   # 11am ET (EDT, UTC-4) -- reads as 10am once EST kicks in
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # notebooks_out/ (fitted model parameters) is gitignored -- a fresh
      # checkout has none of it, so every backtest that writes there has to
      # run before anything that reads its output. Skipping this caused
      # every scheduled run to fail at "Generate current-week projections"
      # (FileNotFoundError on nfl_win_prob_backtest.json) until this fix.
      - name: Pull latest NFL data
        run: python pipeline/nfl/pull_data.py

      # Grades any prediction snapshot (docs/results/nfl_*.json) whose game
      # has now been played, using the schedules/player_stats data just
      # pulled above. Must run before the generator below writes this
      # week's fresh snapshots, so a game that both completed AND is still
      # "current week" (shouldn't normally happen, but just in case) gets
      # graded before being treated as a new pregame snapshot.
      - name: Grade completed-game prediction snapshots
        run: python pipeline/nfl/grade_results.py

      - name: Fit/backtest NFL win-probability model
        run: python pipeline/nfl/backtest_win_prob.py

      - name: Generate current-week NFL projections
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python pipeline/nfl/generate_current_week.py

      # Completed MLB seasons/months never change, so both pull scripts cache
      # their per-season / per-month output to data/mlb/ and skip re-pulling
      # anything already finished -- only the current season (team schedule)
      # and current month (Statcast) are re-fetched live every run. This
      # cache has to survive between runs (a fresh checkout has none of it),
      # so it's restored here and saved back at the end of the job. Using
      # github.run_id as the save key (with a plain prefix as the restore
      # key) means every run saves a new cache entry seeded from the most
      # recent one -- the standard pattern for a cache that keeps growing.
      - name: Restore MLB historical-pull cache
        uses: actions/cache@v4
        with:
          path: |
            data/mlb/team_games_by_season
            data/mlb/statcast_by_month
          key: mlb-data-cache-${{ github.run_id }}
          restore-keys: |
            mlb-data-cache-

      - name: Pull latest MLB team schedule/results
        run: python pipeline/mlb/pull_team_games.py

      - name: Pull latest MLB Statcast game logs
        run: python pipeline/mlb/pull_statcast_gamelogs.py

      - name: Fit/backtest MLB win-probability model
        run: python pipeline/mlb/backtest_win_prob.py

      - name: Fit/backtest MLB starting-pitcher + bullpen blend
        run: python pipeline/mlb/backtest_pitcher_model.py

      - name: Generate current-slate MLB projections
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python pipeline/mlb/generate_daily_slate.py

      - name: Build static site
        run: python pipeline/nfl/build_static_site.py

      # main can move forward while this ~30-40min pipeline is running (a
      # manual code push, another workflow run), which makes a plain `git
      # push` fail with a rejected non-fast-forward -- this happened for
      # real once a manual push landed mid-run. docs/index.html and
      # docs/results/ are fully regenerated every run (not incrementally
      # patched), so there's no real content to reconcile on a collision:
      # retry by re-basing the commit onto whatever is newest and pushing
      # again, rather than just failing.
      - name: Commit and push updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git add docs/index.html docs/results/
            if git diff --quiet --cached; then
              echo "Nothing to commit."
              break
            fi
            git commit -m "Auto-refresh NFL + MLB projections"
            git fetch origin main
            if git push origin main; then
              break
            fi
            echo "Push rejected (remote moved), retrying on top of the latest main..."
            git reset --soft origin/main
            sleep 5
          done

      # Cloudflare becomes the real hosting -- faster/more reliable CDN than
      # GitHub Pages, and we hit a real GitHub Pages deploy 503 once already.
      # Kept alongside the git push above (not replacing it) during the
      # transition so GitHub Pages still works as a fallback until
      # Cloudflare's been verified in production for a while.
      #
      # `wrangler pages deploy` (and the cloudflare/pages-action GitHub
      # Action, tried first) both target the classic Pages Projects API,
      # which returned "The Pages project 'phins-up' does not exist" --
      # wrangler's own error pointed out this project is actually a Worker
      # (its serving domain is workers.dev, not pages.dev), Cloudflare's
      # newer unified static-hosting platform, deployed via `wrangler
      # deploy` reading the repo-root wrangler.toml's [assets] block.
      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
